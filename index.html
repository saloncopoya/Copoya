<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Didi Mandaditos Pro - Envíos en tiempo real</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#00a884">
    
    <!-- Leaflet CSS y JS (OpenStreetMap - 100% gratis, sin API key) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Control Geocoder para buscar direcciones -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        /* Pantalla de autenticación */
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #00a884 0%, #005f45 100%);
            padding: 20px;
            overflow-y: auto;
        }

        .auth-card {
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .auth-card h1 {
            color: #00a884;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #1e2a32;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 30px;
            font-size: 1rem;
            background: #f8f9fa;
        }

        button {
            background: #00a884;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s;
        }

        button:hover {
            background: #008f6e;
            transform: translateY(-2px);
        }

        .toggle-auth {
            margin-top: 24px;
            color: #00a884;
            font-weight: 600;
            cursor: pointer;
        }

        /* Panel principal */
        .app-main {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .map-container {
            flex: 2;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .info-panel {
            background: white;
            border-radius: 32px 32px 0 0;
            padding: 20px 24px;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            max-height: 48%;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f2f5;
        }

        .user-role-badge {
            background: linear-gradient(135deg, #00a884, #008f6e);
            color: white;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn {
            background: #ff6b6b;
            padding: 8px 20px;
            width: auto;
            border-radius: 30px;
            font-size: 0.85rem;
            margin: 0;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e2a32;
            margin: 16px 0 12px 0;
        }

        .selected-location {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.85rem;
        }

        .delivery-list {
            max-height: 200px;
            overflow-y: auto;
            gap: 10px;
            display: flex;
            flex-direction: column;
        }

        .delivery-item {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #e9ecef;
        }

        .accept-btn {
            background: #00a884;
            padding: 8px 20px;
            width: auto;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .order-status-card {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            padding: 16px;
            border-radius: 24px;
            margin-top: 16px;
            border: 1px solid #e9ecef;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-pendiente { background: #ffc107; color: #000; }
        .status-aceptado { background: #00a884; color: white; }
        .status-entregado { background: #28a745; color: white; }

        .history-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        i { margin-right: 6px; }

        @media (max-width: 768px) {
            .info-panel { max-height: 52%; padding: 16px; }
        }

        .info-text {
            color: #00a884;
            font-size: 0.8rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<!-- Pantalla de autenticación -->
<div id="authScreen" class="auth-container">
    <div class="auth-card">
        <i class="fas fa-motorcycle" style="font-size: 50px; color: #00a884; margin-bottom: 16px;"></i>
        <h1>Didi Mandaditos</h1>
        <p>Tuxtla Gutiérrez, Chiapas</p>
        <div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" id="emailInput" placeholder="tu@email.com">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="passwordInput" placeholder="******">
            </div>
            <div class="input-group">
                <label><i class="fas fa-user-tag"></i> Rol</label>
                <select id="roleSelect">
                    <option value="cliente">👤 Cliente</option>
                    <option value="motomandado">🛵 Motomandado</option>
                </select>
            </div>
            <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> Ingresar / Registrarse</button>
            <div class="toggle-auth" id="toggleRegisterBtn">¿Nuevo? Crea tu cuenta</div>
        </div>
        <div id="authMessage" style="margin-top: 16px; color: #dc3545; font-size: 0.8rem;"></div>
    </div>
</div>

<!-- Panel principal -->
<div id="appMain" class="app-main">
    <div class="map-container">
        <div id="map"></div>
    </div>
    <div class="info-panel">
        <div class="user-header">
            <div class="user-role-badge" id="roleBadge"><i class="fas fa-user"></i> Cargando...</div>
            <button id="logoutMainBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>

        <!-- Panel Cliente -->
        <div id="clientePanel">
            <div class="section-title"><i class="fas fa-map-marker-alt"></i> Selecciona tu destino en el mapa</div>
            <div class="selected-location" id="selectedLocationDisplay">
                <i class="fas fa-info-circle"></i> Haz clic en el mapa para seleccionar tu destino
            </div>
            <textarea id="descripcionMandado" rows="2" placeholder="📝 Descripción del paquete / instrucciones especiales" style="width:100%; padding:12px; border-radius:20px; border:2px solid #e9ecef; margin-bottom:10px;"></textarea>
            <input type="text" id="precioEstimado" placeholder="💰 Pago sugerido (MXN)" style="width:100%; padding:12px; border-radius:20px; border:2px solid #e9ecef; margin-bottom:10px;">
            <button id="solicitarMandadoBtn"><i class="fas fa-paper-plane"></i> Solicitar Mandado</button>
            
            <div class="order-status-card" id="orderStatusPanel">
                <div><strong>Estado:</strong> <span id="estadoTexto" class="status-badge status-pendiente">Sin pedido activo</span></div>
                <div id="driverLocationInfo" style="margin-top: 10px;"></div>
            </div>
            
            <div class="section-title"><i class="fas fa-history"></i> Historial</div>
            <div id="historialCliente" style="max-height: 150px; overflow-y: auto;"></div>
        </div>

        <!-- Panel Motomandado -->
        <div id="motomandadoPanel" style="display: none;">
            <div class="section-title"><i class="fas fa-list-ul"></i> Mandados disponibles</div>
            <div id="availableOrdersList" class="delivery-list">Cargando...</div>
            <div class="section-title"><i class="fas fa-tasks"></i> Mi mandado activo</div>
            <div id="myAssignedDelivery" class="order-status-card"></div>
            <div class="section-title"><i class="fas fa-chart-line"></i> Mis estadísticas</div>
            <div id="statsMoto" style="background: #f8f9fa; border-radius: 20px; padding: 12px;"></div>
        </div>
    </div>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyASox7mRak5V0py29htEVWCVeipGpA0yfs",
        authDomain: "galloslivebadge.firebaseapp.com",
        databaseURL: "https://galloslivebadge-default-rtdb.firebaseio.com",
        projectId: "galloslivebadge",
        storageBucket: "galloslivebadge.firebasestorage.app",
        messagingSenderId: "979482928760",
        appId: "1:979482928760:web:3ea879dc4ee1e020df6f8d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Variables globales
    let currentUser = null;
    let currentRole = null;
    let map = null;
    let userMarker = null;
    let driverMarker = null;
    let selectedDestMarker = null;
    let selectedDestCoords = null;
    let selectedDestAddress = "";
    let activeOrderId = null;
    let assignedOrderId = null;
    let watchPositionId = null;

    // Coordenadas de Tuxtla Gutiérrez
    const TUXTLA_CENTER = [16.7549, -93.1149];

    // Inicializar mapa
    function initMap() {
        if (map) return;
        
        map = L.map('map').setView(TUXTLA_CENTER, 14);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        // Control de búsqueda de direcciones
        const geocoder = L.Control.geocoder({
            defaultMarkGeocode: false,
            placeholder: 'Buscar dirección en Tuxtla...',
            position: 'topleft'
        }).on('markgeocode', function(e) {
            const center = e.geocode.center;
            if (selectedDestMarker) map.removeLayer(selectedDestMarker);
            selectedDestCoords = { lat: center.lat, lng: center.lng };
            selectedDestAddress = e.geocode.name;
            selectedDestMarker = L.marker([center.lat, center.lng], {
                icon: L.divIcon({ html: '<i class="fas fa-map-pin" style="font-size:30px;color:#ff4444;"></i>', iconSize: [30, 30] })
            }).addTo(map);
            document.getElementById('selectedLocationDisplay').innerHTML = `<i class="fas fa-check-circle"></i> Destino: ${selectedDestAddress.substring(0, 60)}`;
            map.setView(center, 16);
        }).addTo(map);
        
        // Click en el mapa para seleccionar destino
        map.on('click', async function(e) {
            if (currentRole !== 'cliente') return;
            if (selectedDestMarker) map.removeLayer(selectedDestMarker);
            selectedDestCoords = { lat: e.latlng.lat, lng: e.latlng.lng };
            
            // Reverse geocoding para obtener dirección
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&zoom=18&addressdetails=1`);
                const data = await response.json();
                selectedDestAddress = data.display_name || `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
            } catch(err) {
                selectedDestAddress = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
            }
            
            selectedDestMarker = L.marker([e.latlng.lat, e.latlng.lng], {
                icon: L.divIcon({ html: '<i class="fas fa-map-pin" style="font-size:30px;color:#ff4444;"></i>', iconSize: [30, 30] })
            }).addTo(map);
            document.getElementById('selectedLocationDisplay').innerHTML = `<i class="fas fa-check-circle"></i> Destino: ${selectedDestAddress.substring(0, 60)}`;
        });
    }

    // Obtener ubicación actual
    function getCurrentPosition() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) reject("Geolocalización no soportada");
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
        });
    }

    // Actualizar ubicación en Firebase
    async function updateLocation() {
        if (!currentUser) return;
        try {
            const pos = await getCurrentPosition();
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            await db.ref(`users/${currentUser.uid}/location`).set({ lat, lng, timestamp: Date.now() });
            
            if (map) {
                if (!userMarker) {
                    const iconUrl = currentRole === 'cliente' 
                        ? 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png'
                        : 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png';
                    userMarker = L.marker([lat, lng], { title: 'Mi ubicación' }).addTo(map);
                } else {
                    userMarker.setLatLng([lat, lng]);
                }
                map.setView([lat, lng], 15);
            }
            
            if (currentRole === 'motomandado' && assignedOrderId) {
                await db.ref(`orders/${assignedOrderId}/driverLocation`).set({ lat, lng });
            }
        } catch (err) {
            console.warn("Error ubicación:", err);
        }
    }

    // Seguimiento en tiempo real
    function startTracking() {
        if (watchPositionId) navigator.geolocation.clearWatch(watchPositionId);
        watchPositionId = navigator.geolocation.watchPosition(async (pos) => {
            if (!currentUser) return;
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            await db.ref(`users/${currentUser.uid}/location`).set({ lat, lng, timestamp: Date.now() });
            if (userMarker) userMarker.setLatLng([lat, lng]);
            if (currentRole === 'motomandado' && assignedOrderId) {
                await db.ref(`orders/${assignedOrderId}/driverLocation`).set({ lat, lng });
            }
        }, (err) => console.warn(err), { enableHighAccuracy: true, maximumAge: 3000, timeout: 8000 });
    }

    // Solicitar mandado
    async function requestOrder() {
        if (!currentUser || currentRole !== 'cliente') {
            alert("Debes ser cliente para solicitar mandados");
            return;
        }
        if (!selectedDestCoords) {
            alert("Por favor, selecciona un destino en el mapa haciendo clic");
            return;
        }
        
        const descripcion = document.getElementById('descripcionMandado').value.trim();
        const pago = document.getElementById('precioEstimado').value.trim();
        
        let originCoords = null;
        try {
            const pos = await getCurrentPosition();
            originCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        } catch(e) {
            originCoords = TUXTLA_CENTER;
        }
        
        const newOrderRef = db.ref('orders').push();
        await newOrderRef.set({
            clientId: currentUser.uid,
            clientEmail: currentUser.email,
            destino: selectedDestAddress,
            destinoCoords: selectedDestCoords,
            origenCoords: originCoords,
            descripcion: descripcion || "Sin descripción",
            pago: pago || "A convenir",
            status: 'pendiente',
            timestamp: Date.now(),
            driverId: null
        });
        
        activeOrderId = newOrderRef.key;
        document.getElementById('estadoTexto').innerText = '⏳ Buscando repartidor...';
        document.getElementById('estadoTexto').className = 'status-badge status-pendiente';
        
        // Limpiar selección
        if (selectedDestMarker) map.removeLayer(selectedDestMarker);
        selectedDestCoords = null;
        document.getElementById('selectedLocationDisplay').innerHTML = '<i class="fas fa-info-circle"></i> Haz clic en el mapa para seleccionar tu destino';
        document.getElementById('descripcionMandado').value = '';
        document.getElementById('precioEstimado').value = '';
        
        // Escuchar el pedido
        listenToOrder(activeOrderId);
    }

    // Escuchar pedido activo
    function listenToOrder(orderId) {
        const orderRef = db.ref(`orders/${orderId}`);
        orderRef.on('value', (snap) => {
            const order = snap.val();
            if (!order) return;
            
            const estadoSpan = document.getElementById('estadoTexto');
            if (order.status === 'pendiente') {
                estadoSpan.innerText = '⏳ Buscando repartidor...';
            } else if (order.status === 'aceptado') {
                estadoSpan.innerText = '🛵 En camino';
                document.getElementById('driverLocationInfo').innerHTML = '<i class="fas fa-motorcycle"></i> Repartidor asignado - En ruta hacia ti';
                
                // Mostrar marcador del repartidor si existe
                if (order.driverLocation && driverMarker) {
                    driverMarker.setLatLng([order.driverLocation.lat, order.driverLocation.lng]);
                } else if (order.driverLocation) {
                    driverMarker = L.marker([order.driverLocation.lat, order.driverLocation.lng], {
                        icon: L.divIcon({ html: '<i class="fas fa-motorcycle" style="font-size:24px;color:#00a884;"></i>', iconSize: [24, 24] })
                    }).addTo(map);
                }
            } else if (order.status === 'entregado') {
                estadoSpan.innerText = '✅ Entregado';
                if (driverMarker) map.removeLayer(driverMarker);
                activeOrderId = null;
                loadClientHistory();
                orderRef.off();
            }
            estadoSpan.className = `status-badge status-${order.status}`;
        });
    }

    // Cargar pedidos para motomandado
    function loadAvailableOrders() {
        if (!currentUser || currentRole !== 'motomandado') return;
        const ordersRef = db.ref('orders');
        ordersRef.off('value');
        ordersRef.on('value', (snap) => {
            const orders = snap.val();
            const container = document.getElementById('availableOrdersList');
            if (!container) return;
            if (!orders) { container.innerHTML = "<i class='fas fa-inbox'></i> No hay pedidos"; return; }
            
            let html = '';
            for (let id in orders) {
                const order = orders[id];
                if (order.status === 'pendiente' && !order.driverId) {
                    html += `
                        <div class="delivery-item">
                            <div><strong>${order.destino.substring(0, 50)}</strong><br>
                            <small>📦 ${order.descripcion || 'Sin descripción'} | 💰 ${order.pago}</small></div>
                            <button class="accept-btn" data-orderid="${id}"><i class="fas fa-check-circle"></i> Aceptar</button>
                        </div>
                    `;
                }
            }
            container.innerHTML = html || "<i class='fas fa-clock'></i> No hay mandados disponibles";
            
            document.querySelectorAll('.accept-btn').forEach(btn => {
                btn.addEventListener('click', (e) => acceptOrder(btn.getAttribute('data-orderid')));
            });
        });
    }

    // Aceptar pedido
    async function acceptOrder(orderId) {
        if (!currentUser || currentRole !== 'motomandado') return;
        const orderRef = db.ref(`orders/${orderId}`);
        const snap = await orderRef.once('value');
        const order = snap.val();
        if (!order || order.status !== 'pendiente') { alert("Pedido ya no disponible"); return; }
        
        await orderRef.update({ driverId: currentUser.uid, status: 'aceptado', acceptedAt: Date.now() });
        assignedOrderId = orderId;
        
        document.getElementById('myAssignedDelivery').innerHTML = `
            <div><strong>Mandado activo</strong><br>
            Destino: ${order.destino}<br>📦 ${order.descripcion}<br>💰 ${order.pago}</div>
            <button id="completeOrderBtn" class="accept-btn" style="background:#28a745;"><i class="fas fa-flag-checkered"></i> Marcar entregado</button>
        `;
        
        document.getElementById('completeOrderBtn')?.addEventListener('click', async () => {
            await db.ref(`orders/${assignedOrderId}`).update({ status: 'entregado', completedAt: Date.now() });
            const statsRef = db.ref(`users/${currentUser.uid}/stats`);
            const currentStats = (await statsRef.once('value')).val() || { deliveries: 0, earnings: 0 };
            const pagoNum = parseInt(order.pago) || 0;
            await statsRef.set({ deliveries: currentStats.deliveries + 1, earnings: currentStats.earnings + pagoNum });
            assignedOrderId = null;
            document.getElementById('myAssignedDelivery').innerHTML = "<i class='fas fa-trophy'></i> ¡Mandado completado!";
            loadAvailableOrders();
            loadMotoStats();
        });
        
        loadAvailableOrders();
    }

    // Historial del cliente
    async function loadClientHistory() {
        if (!currentUser || currentRole !== 'cliente') return;
        const snap = await db.ref('orders').orderByChild('clientId').equalTo(currentUser.uid).once('value');
        const historyDiv = document.getElementById('historialCliente');
        let html = '';
        snap.forEach(child => {
            const o = child.val();
            if (o.status === 'entregado') {
                html += `<div class="history-item"><i class="fas fa-check-circle" style="color:#28a745"></i> ${o.destino.substring(0, 40)} - ${new Date(o.timestamp).toLocaleDateString()}<br>💰 ${o.pago}</div>`;
            }
        });
        historyDiv.innerHTML = html || "<i class='fas fa-history'></i> No hay entregas previas";
    }

    // Estadísticas moto
    async function loadMotoStats() {
        if (!currentUser || currentRole !== 'motomandado') return;
        const stats = (await db.ref(`users/${currentUser.uid}/stats`).once('value')).val() || { deliveries: 0, earnings: 0 };
        document.getElementById('statsMoto').innerHTML = `<i class="fas fa-truck"></i> Entregas: ${stats.deliveries} | 💰 Ganancias: $${stats.earnings} MXN`;
    }

    // Aplicar UI por rol
    function applyUI(role) {
        const clienteDiv = document.getElementById('clientePanel');
        const motoDiv = document.getElementById('motomandadoPanel');
        if (role === 'cliente') {
            clienteDiv.style.display = 'block';
            motoDiv.style.display = 'none';
            document.getElementById('roleBadge').innerHTML = '<i class="fas fa-user"></i> Cliente';
            loadClientHistory();
        } else {
            clienteDiv.style.display = 'none';
            motoDiv.style.display = 'block';
            document.getElementById('roleBadge').innerHTML = '<i class="fas fa-motorcycle"></i> Motomandado';
            loadAvailableOrders();
            loadMotoStats();
        }
    }

    // Logout
    async function logout() {
        if (watchPositionId) navigator.geolocation.clearWatch(watchPositionId);
        if (currentUser) await db.ref(`users/${currentUser.uid}/location`).remove();
        await auth.signOut();
        location.reload();
    }

    // Autenticación
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            const roleSnap = await db.ref(`users/${user.uid}/role`).once('value');
            currentRole = roleSnap.val() || document.getElementById('roleSelect').value;
            if (!roleSnap.exists()) await db.ref(`users/${user.uid}/role`).set(currentRole);
            
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appMain').style.display = 'flex';
            initMap();
            await updateLocation();
            startTracking();
            applyUI(currentRole);
            
            // Verificar pedido activo para cliente
            if (currentRole === 'cliente') {
                const ordersSnap = await db.ref('orders').orderByChild('clientId').equalTo(user.uid).once('value');
                ordersSnap.forEach(child => {
                    const ord = child.val();
                    if (ord.status === 'pendiente' || ord.status === 'aceptado') {
                        activeOrderId = child.key;
                        listenToOrder(activeOrderId);
                    }
                });
            }
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appMain').style.display = 'none';
        }
    });

    // Event listeners
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('emailInput').value;
        const pwd = document.getElementById('passwordInput').value;
        const role = document.getElementById('roleSelect').value;
        if (!email || !pwd) { document.getElementById('authMessage').innerText = "Completa todos los campos"; return; }
        try {
            await auth.signInWithEmailAndPassword(email, pwd);
        } catch (err) {
            if (err.code === 'auth/user-not-found') {
                await auth.createUserWithEmailAndPassword(email, pwd);
                await db.ref(`users/${auth.currentUser.uid}/role`).set(role);
            } else { document.getElementById('authMessage').innerText = err.message; }
        }
    });
    
    document.getElementById('solicitarMandadoBtn')?.addEventListener('click', requestOrder);
    document.getElementById('logoutMainBtn')?.addEventListener('click', logout);
    
    // Inicializar mapa al cargar
    setTimeout(() => initMap(), 100);
</script>
</body>
</html>

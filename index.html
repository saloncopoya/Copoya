<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Didi Mandaditos Pro - Envíos en tiempo real</title>
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00a884">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Leaflet CSS y JS (OpenStreetMap - sin API key) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Routing Machine para rutas -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        /* Pantallas de autenticación */
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #00a884 0%, #005f45 100%);
            padding: 20px;
            overflow-y: auto;
        }

        .auth-card {
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card h1 {
            color: #00a884;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .auth-card p {
            color: #6c757d;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #1e2a32;
            font-size: 0.9rem;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 30px;
            font-size: 1rem;
            background: #f8f9fa;
            transition: all 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #00a884;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 168, 132, 0.1);
        }

        button {
            background: #00a884;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s;
        }

        button:hover {
            background: #008f6e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 168, 132, 0.3);
        }

        .toggle-auth {
            margin-top: 24px;
            color: #00a884;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Panel principal */
        .app-main {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #f8f9fa;
        }

        .map-container {
            flex: 2;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #e8eef4;
        }

        .info-panel {
            background: white;
            border-radius: 32px 32px 0 0;
            padding: 20px 24px;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            max-height: 48%;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f2f5;
        }

        .user-role-badge {
            background: linear-gradient(135deg, #00a884, #008f6e);
            color: white;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn {
            background: #ff6b6b;
            padding: 8px 20px;
            width: auto;
            border-radius: 30px;
            font-size: 0.85rem;
            margin: 0;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e2a32;
            margin: 16px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .request-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .request-form input,
        .request-form textarea {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 2px solid #e9ecef;
            background: #f8f9fa;
            font-size: 0.9rem;
        }

        .request-form textarea {
            flex-basis: 100%;
            resize: vertical;
            font-family: inherit;
        }

        .order-status-card {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            padding: 16px;
            border-radius: 24px;
            margin-top: 16px;
            border: 1px solid #e9ecef;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-pendiente { background: #ffc107; color: #000; }
        .status-aceptado { background: #00a884; color: white; }
        .status-entregado { background: #28a745; color: white; }

        .delivery-list {
            max-height: 200px;
            overflow-y: auto;
            gap: 10px;
            display: flex;
            flex-direction: column;
        }

        .delivery-item {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #e9ecef;
            transition: all 0.2s;
            cursor: pointer;
        }

        .delivery-item:hover {
            transform: translateX(5px);
            border-color: #00a884;
        }

        .accept-btn {
            background: #00a884;
            padding: 8px 20px;
            width: auto;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .history-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        i { margin-right: 6px; }

        @media (max-width: 768px) {
            .info-panel { max-height: 52%; padding: 16px; }
            .request-form { flex-direction: column; }
        }

        /* Loader */
        .loader { text-align: center; padding: 20px; color: #00a884; }
    </style>
</head>
<body>

<!-- Pantalla de autenticación -->
<div id="authScreen" class="auth-container">
    <div class="auth-card">
        <i class="fas fa-motorcycle" style="font-size: 50px; color: #00a884; margin-bottom: 16px;"></i>
        <h1>Didi Mandaditos</h1>
        <p>Envíos rápidos · Rastreo en vivo · Seguridad total</p>
        <div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" id="emailInput" placeholder="tu@email.com">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="passwordInput" placeholder="******">
            </div>
            <div class="input-group">
                <label><i class="fas fa-user-tag"></i> Selecciona tu rol</label>
                <select id="roleSelect">
                    <option value="cliente">👤 Cliente - Solicitar mandados</option>
                    <option value="motomandado">🛵 Motomandado - Repartidor profesional</option>
                </select>
            </div>
            <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> Ingresar / Registrarse</button>
            <div class="toggle-auth" id="toggleRegisterBtn">¿Nuevo? Crea tu cuenta gratuita</div>
        </div>
        <div id="authMessage" style="margin-top: 16px; color: #dc3545; font-size: 0.8rem;"></div>
    </div>
</div>

<!-- Panel principal -->
<div id="appMain" class="app-main">
    <div class="map-container">
        <div id="map"></div>
    </div>
    <div class="info-panel">
        <div class="user-header">
            <div class="user-role-badge" id="roleBadge"><i class="fas fa-user"></i> Cargando...</div>
            <button id="logoutMainBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>

        <div id="clientePanel">
            <div class="section-title"><i class="fas fa-shopping-cart"></i> Solicitar nuevo mandado</div>
            <div class="request-form">
                <input type="text" id="destinoInput" placeholder="🎯 Destino (dirección completa)">
                <textarea id="descripcionMandado" rows="2" placeholder="📝 Descripción del paquete / instrucciones"></textarea>
                <input type="text" id="precioEstimado" placeholder="💰 Pago sugerido (MXN)">
                <button id="solicitarMandadoBtn"><i class="fas fa-paper-plane"></i> Solicitar Mandado</button>
            </div>
            <div class="order-status-card" id="orderStatusPanel">
                <div><i class="fas fa-clipboard-list"></i> <strong>Estado:</strong> <span id="estadoTexto" class="status-badge status-pendiente">Sin pedido activo</span></div>
                <div id="driverLocationInfo" style="margin-top: 10px;"></div>
                <div id="distanceInfo" style="margin-top: 5px; font-size: 0.8rem;"></div>
            </div>
            <div class="section-title"><i class="fas fa-history"></i> Historial de mandados</div>
            <div id="historialCliente" style="max-height: 150px; overflow-y: auto;"></div>
        </div>

        <div id="motomandadoPanel" style="display: none;">
            <div class="section-title"><i class="fas fa-list-ul"></i> Mandados disponibles</div>
            <div id="availableOrdersList" class="delivery-list">Cargando pedidos...</div>
            <div class="section-title"><i class="fas fa-tasks"></i> Mi mandado activo</div>
            <div id="myAssignedDelivery" class="order-status-card"></div>
            <div class="section-title"><i class="fas fa-chart-line"></i> Mis estadísticas</div>
            <div id="statsMoto" style="background: #f8f9fa; border-radius: 20px; padding: 12px;"></div>
        </div>
    </div>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyASox7mRak5V0py29htEVWCVeipGpA0yfs",
        authDomain: "galloslivebadge.firebaseapp.com",
        databaseURL: "https://galloslivebadge-default-rtdb.firebaseio.com",
        projectId: "galloslivebadge",
        storageBucket: "galloslivebadge.firebasestorage.app",
        messagingSenderId: "979482928760",
        appId: "1:979482928760:web:3ea879dc4ee1e020df6f8d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Variables globales
    let currentUser = null;
    let currentRole = null;
    let map = null;
    let userMarker = null;
    let driverMarker = null;
    let clientMarkerMoto = null;
    let activeOrderId = null;
    let assignedOrderId = null;
    let orderListener = null;
    let routingControl = null;
    let watchPositionId = null;

    // Inicializar mapa con Leaflet (OpenStreetMap - sin API key)
    function initMap() {
        if (map) return;
        map = L.map('map').setView([19.4326, -99.1332], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
    }

    // Obtener ubicación actual
    function getCurrentPosition() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) reject("Geolocalización no soportada");
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
        });
    }

    // Geocodificación reversa usando Nominatim (OSM)
    async function geocodeAddress(address) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
            const data = await response.json();
            if (data && data.length > 0) {
                return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            }
            return null;
        } catch (e) { return null; }
    }

    // Actualizar ubicación en Firebase
    async function updateLocation() {
        if (!currentUser) return;
        try {
            const pos = await getCurrentPosition();
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            await db.ref(`users/${currentUser.uid}/location`).set({ lat, lng, timestamp: Date.now() });
            if (map) {
                if (!userMarker) {
                    const iconUrl = currentRole === 'cliente' 
                        ? 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png'
                        : 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png';
                    userMarker = L.marker([lat, lng], { title: currentRole === 'cliente' ? 'Mi ubicación' : 'Mi moto' }).addTo(map);
                } else {
                    userMarker.setLatLng([lat, lng]);
                }
                map.setView([lat, lng], 14);
            }
            if (currentRole === 'motomandado' && assignedOrderId) {
                await db.ref(`orders/${assignedOrderId}/driverLocation`).set({ lat, lng });
            }
        } catch (err) { console.warn("Error ubicación:", err); }
    }

    function startTracking() {
        if (watchPositionId) navigator.geolocation.clearWatch(watchPositionId);
        watchPositionId = navigator.geolocation.watchPosition(async (pos) => {
            if (!currentUser) return;
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            await db.ref(`users/${currentUser.uid}/location`).set({ lat, lng, timestamp: Date.now() });
            if (userMarker) userMarker.setLatLng([lat, lng]);
            if (currentRole === 'motomandado' && assignedOrderId) {
                await db.ref(`orders/${assignedOrderId}/driverLocation`).set({ lat, lng });
            }
        }, (err) => console.warn(err), { enableHighAccuracy: true, maximumAge: 3000, timeout: 8000 });
    }

    // Cliente: escuchar pedido
    function listenToOrder(orderId) {
        if (orderListener) orderListener();
        const orderRef = db.ref(`orders/${orderId}`);
        orderListener = orderRef.on('value', async (snap) => {
            const order = snap.val();
            if (!order) return;
            const estadoSpan = document.getElementById('estadoTexto');
            estadoSpan.innerText = order.status === 'pendiente' ? '⏳ Buscando repartidor...' : order.status === 'aceptado' ? '🛵 En camino' : '✅ Entregado';
            estadoSpan.className = `status-badge status-${order.status}`;
            
            if (order.status === 'aceptado' && order.driverLocation) {
                if (driverMarker) map.removeLayer(driverMarker);
                driverMarker = L.marker([order.driverLocation.lat, order.driverLocation.lng], { 
                    title: 'Repartidor',
                    icon: L.divIcon({ html: '<i class="fas fa-motorcycle" style="font-size:24px;color:#00a884;"></i>', iconSize: [24, 24] })
                }).addTo(map);
                document.getElementById('driverLocationInfo').innerHTML = '<i class="fas fa-motorcycle"></i> Repartidor en movimiento - Actualización en tiempo real';
                
                if (userMarker) {
                    const userPos = userMarker.getLatLng();
                    const driverPos = { lat: order.driverLocation.lat, lng: order.driverLocation.lng };
                    const R = 6371;
                    const dLat = (driverPos.lat - userPos.lat) * Math.PI / 180;
                    const dLon = (driverPos.lng - userPos.lng) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userPos.lat * Math.PI/180) * Math.cos(driverPos.lat * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    const distance = R * c;
                    document.getElementById('distanceInfo').innerHTML = `📏 Distancia aproximada: ${distance.toFixed(1)} km`;
                }
            }
            if (order.status === 'entregado') {
                if (driverMarker) map.removeLayer(driverMarker);
                activeOrderId = null;
                loadClientHistory();
                orderRef.off();
            }
        });
    }

    // Solicitar mandado
    async function requestOrder() {
        if (!currentUser || currentRole !== 'cliente') return;
        const destino = document.getElementById('destinoInput').value.trim();
        const descripcion = document.getElementById('descripcionMandado').value.trim();
        const pago = document.getElementById('precioEstimado').value.trim();
        if (!destino) { alert("Ingresa un destino válido"); return; }
        
        let originCoords = null;
        try {
            const pos = await getCurrentPosition();
            originCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        } catch(e) { originCoords = { lat: 19.4326, lng: -99.1332 }; }
        
        const destCoords = await geocodeAddress(destino);
        if (!destCoords) { alert("No se pudo ubicar el destino, intenta con más detalles"); return; }
        
        const newOrderRef = db.ref('orders').push();
        await newOrderRef.set({
            clientId: currentUser.uid,
            clientEmail: currentUser.email,
            destino: destino,
            destinoCoords: destCoords,
            origenCoords: originCoords,
            descripcion: descripcion,
            pago: pago || "A convenir",
            status: 'pendiente',
            timestamp: Date.now(),
            driverId: null
        });
        activeOrderId = newOrderRef.key;
        document.getElementById('estadoTexto').innerText = '⏳ Buscando repartidor...';
        document.getElementById('destinoInput').value = '';
        document.getElementById('descripcionMandado').value = '';
        listenToOrder(activeOrderId);
    }

    // Cargar pedidos para moto
    function loadAvailableOrders() {
        if (!currentUser || currentRole !== 'motomandado') return;
        const ordersRef = db.ref('orders');
        ordersRef.off('value');
        ordersRef.on('value', (snap) => {
            const orders = snap.val();
            const container = document.getElementById('availableOrdersList');
            if (!container) return;
            if (!orders) { container.innerHTML = "<i class='fas fa-inbox'></i> No hay pedidos"; return; }
            let html = '';
            for (let id in orders) {
                const order = orders[id];
                if (order.status === 'pendiente' && !order.driverId) {
                    html += `
                        <div class="delivery-item">
                            <div><i class="fas fa-location-dot"></i> <strong>${order.destino.substring(0, 40)}</strong><br>
                            <small>📦 ${order.descripcion || 'Sin descripción'} | 💰 ${order.pago || 'Pactar'}</small></div>
                            <button class="accept-btn" data-orderid="${id}"><i class="fas fa-check-circle"></i> Aceptar mandado</button>
                        </div>
                    `;
                }
            }
            container.innerHTML = html || "<i class='fas fa-clock'></i> No hay mandados disponibles";
            document.querySelectorAll('.accept-btn').forEach(btn => {
                btn.addEventListener('click', (e) => acceptOrder(btn.getAttribute('data-orderid')));
            });
        });
    }

    // Aceptar pedido (moto)
    async function acceptOrder(orderId) {
        if (!currentUser || currentRole !== 'motomandado') return;
        const orderRef = db.ref(`orders/${orderId}`);
        const snap = await orderRef.once('value');
        const order = snap.val();
        if (!order || order.status !== 'pendiente') { alert("Pedido ya no disponible"); return; }
        await orderRef.update({ driverId: currentUser.uid, status: 'aceptado', acceptedAt: Date.now() });
        assignedOrderId = orderId;
        
        document.getElementById('myAssignedDelivery').innerHTML = `
            <div><i class="fas fa-check-circle" style="color:#00a884"></i> <strong>Mandado activo</strong><br>
            Destino: ${order.destino}<br>🧾 ${order.descripcion || ''}<br>💰 ${order.pago || 'A convenir'}</div>
            <button id="completeOrderBtn" class="accept-btn" style="background:#28a745; margin-top:10px"><i class="fas fa-flag-checkered"></i> Marcar como entregado</button>
        `;
        document.getElementById('completeOrderBtn')?.addEventListener('click', async () => {
            await db.ref(`orders/${assignedOrderId}`).update({ status: 'entregado', completedAt: Date.now() });
            const statsRef = db.ref(`users/${currentUser.uid}/stats`);
            const currentStats = (await statsRef.once('value')).val() || { deliveries: 0, earnings: 0 };
            const pagoNum = parseInt(order.pago) || 0;
            await statsRef.set({ deliveries: currentStats.deliveries + 1, earnings: currentStats.earnings + pagoNum });
            assignedOrderId = null;
            document.getElementById('myAssignedDelivery').innerHTML = "<i class='fas fa-trophy'></i> ¡Mandado completado!";
            if (clientMarkerMoto) map.removeLayer(clientMarkerMoto);
            loadAvailableOrders();
            loadMotoStats();
        });
        
        // Seguir cliente
        const clientLocRef = db.ref(`users/${order.clientId}/location`);
        clientLocRef.on('value', (locSnap) => {
            if (locSnap.exists() && map) {
                const loc = locSnap.val();
                if (!clientMarkerMoto) {
                    clientMarkerMoto = L.marker([loc.lat, loc.lng], { title: 'Cliente' }).addTo(map);
                } else {
                    clientMarkerMoto.setLatLng([loc.lat, loc.lng]);
                }
            }
        });
    }

    // Historial cliente
    async function loadClientHistory() {
        if (!currentUser || currentRole !== 'cliente') return;
        const snap = await db.ref('orders').orderByChild('clientId').equalTo(currentUser.uid).once('value');
        const historyDiv = document.getElementById('historialCliente');
        let html = '';
        snap.forEach(child => {
            const o = child.val();
            if (o.status === 'entregado') {
                html += `<div class="history-item"><i class="fas fa-check-circle" style="color:#28a745"></i> ${o.destino} - ${new Date(o.timestamp).toLocaleString()}<br>💰 ${o.pago}</div>`;
            }
        });
        historyDiv.innerHTML = html || "<i class='fas fa-history'></i> No hay entregas previas";
    }

    // Estadísticas moto
    async function loadMotoStats() {
        if (!currentUser || currentRole !== 'motomandado') return;
        const stats = (await db.ref(`users/${currentUser.uid}/stats`).once('value')).val() || { deliveries: 0, earnings: 0 };
        document.getElementById('statsMoto').innerHTML = `<i class="fas fa-truck"></i> Entregas: ${stats.deliveries} | 💰 Ganancias: $${stats.earnings} MXN`;
    }

    // Aplicar UI por rol
    function applyUI(role) {
        const clienteDiv = document.getElementById('clientePanel');
        const motoDiv = document.getElementById('motomandadoPanel');
        if (role === 'cliente') {
            clienteDiv.style.display = 'block';
            motoDiv.style.display = 'none';
            document.getElementById('roleBadge').innerHTML = '<i class="fas fa-user"></i> Cliente Premium';
            loadClientHistory();
        } else {
            clienteDiv.style.display = 'none';
            motoDiv.style.display = 'block';
            document.getElementById('roleBadge').innerHTML = '<i class="fas fa-motorcycle"></i> Motomandado Pro';
            loadAvailableOrders();
            loadMotoStats();
        }
    }

    // Logout
    async function logout() {
        if (watchPositionId) navigator.geolocation.clearWatch(watchPositionId);
        if (currentUser) await db.ref(`users/${currentUser.uid}/location`).remove();
        await auth.signOut();
        location.reload();
    }

    // Autenticación
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            const roleSnap = await db.ref(`users/${user.uid}/role`).once('value');
            currentRole = roleSnap.val() || document.getElementById('roleSelect').value;
            if (!roleSnap.exists()) await db.ref(`users/${user.uid}/role`).set(currentRole);
            await db.ref(`users/${user.uid}`).update({ email: user.email, role: currentRole });
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appMain').style.display = 'flex';
            initMap();
            startTracking();
            applyUI(currentRole);
            
            // Recuperar pedido activo si existe
            const ordersSnap = await db.ref('orders').orderByChild('clientId').equalTo(user.uid).once('value');
            ordersSnap.forEach(child => {
                const ord = child.val();
                if (ord.status === 'pendiente' || ord.status === 'aceptado') {
                    activeOrderId = child.key;
                    listenToOrder(activeOrderId);
                    document.getElementById('estadoTexto').innerText = ord.status === 'pendiente' ? '⏳ Pendiente' : '🛵 En camino';
                }
            });
            if (currentRole === 'motomandado') {
                const assigned = await db.ref('orders').orderByChild('driverId').equalTo(user.uid).once('value');
                assigned.forEach(child => {
                    if (child.val().status === 'aceptado') assignedOrderId = child.key;
                });
            }
            await updateLocation();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appMain').style.display = 'none';
        }
    });

    // Event listeners
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('emailInput').value;
        const pwd = document.getElementById('passwordInput').value;
        const role = document.getElementById('roleSelect').value;
        if (!email || !pwd) { document.getElementById('authMessage').innerText = "Completa todos los campos"; return; }
        try {
            await auth.signInWithEmailAndPassword(email, pwd);
            await db.ref(`users/${auth.currentUser.uid}/role`).set(role);
        } catch (err) {
            if (err.code === 'auth/user-not-found') {
                await auth.createUserWithEmailAndPassword(email, pwd);
                await db.ref(`users/${auth.currentUser.uid}/role`).set(role);
            } else { document.getElementById('authMessage').innerText = err.message; }
        }
    });
    document.getElementById('solicitarMandadoBtn')?.addEventListener('click', requestOrder);
    document.getElementById('logoutMainBtn')?.addEventListener('click', logout);
    
    // Inicializar mapa al cargar
    setTimeout(() => { if (document.getElementById('map') && !map) initMap(); }, 100);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Didi Mandaditos - Envíos en tiempo real</title>
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00a884">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <!-- Google Maps API (con librería de marcadores avanzados y geocoding) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASox7mRak5V0py29htEVWCVeipGpA0yfs&libraries=places,geometry&callback=initMapGlobal" async defer></script>
    <!-- Leaflet (fallback / extra visual) pero usaremos Google Maps nativo -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f7fb;
            height: 100vh;
            overflow: hidden;
        }
        /* Pantallas de autenticación */
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(145deg, #00a884 0%, #008f6e 100%);
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
        }
        .auth-card h1 {
            color: #00a884;
            margin-bottom: 8px;
        }
        .auth-card p {
            color: #5e5e5e;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .input-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #1e2a32;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 28px;
            font-size: 1rem;
            background: #f9f9f9;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: #00a884;
            outline: none;
            background: white;
        }
        button {
            background: #00a884;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }
        button:hover {
            background: #008f6e;
        }
        .toggle-auth {
            margin-top: 20px;
            color: #00a884;
            font-weight: 500;
            cursor: pointer;
        }
        /* Panel principal app (oculto inicialmente) */
        .app-main {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #f0f2f5;
        }
        .map-container {
            flex: 1;
            position: relative;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .info-panel {
            background: white;
            border-radius: 28px 28px 0 0;
            padding: 18px 20px;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.08);
            position: relative;
            z-index: 10;
        }
        .user-role-badge {
            background: #eef2f5;
            border-radius: 40px;
            padding: 6px 12px;
            display: inline-block;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .request-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .request-form input {
            flex: 2;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #ccc;
        }
        .request-form button {
            flex: 1;
            margin-top: 0;
            background: #00a884;
        }
        .order-status {
            margin-top: 15px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .order-status span {
            font-weight: bold;
            color: #00a884;
        }
        .active-delivery {
            border-top: 1px solid #e9ecef;
            margin-top: 12px;
            padding-top: 12px;
        }
        .delivery-list {
            max-height: 120px;
            overflow-y: auto;
        }
        .delivery-item {
            background: #f1f3f5;
            border-radius: 24px;
            padding: 10px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .accept-btn {
            background: #2c7da0;
            padding: 6px 16px;
            width: auto;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .logout-btn {
            background: #ff6b6b;
            margin-top: 5px;
            width: auto;
            display: inline-block;
            padding: 8px 20px;
            font-size: 0.8rem;
        }
        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 600px) {
            .request-form { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- Pantalla de autenticación -->
<div id="authScreen" class="auth-container">
    <div class="auth-card">
        <h1>📦 Didi Mandaditos</h1>
        <p>Envíos rápidos · Rastreo en vivo</p>
        <div id="authTabs">
            <div class="input-group">
                <label>📧 Correo</label>
                <input type="email" id="emailInput" placeholder="tu@email.com">
            </div>
            <div class="input-group">
                <label>🔒 Contraseña</label>
                <input type="password" id="passwordInput" placeholder="******">
            </div>
            <div class="input-group">
                <label>👤 Rol</label>
                <select id="roleSelect">
                    <option value="cliente">Cliente (solicito mandados)</option>
                    <option value="motomandado">Motomandado (repartidor)</option>
                </select>
            </div>
            <button id="loginBtn">Iniciar sesión</button>
            <div class="toggle-auth" id="toggleRegisterBtn">¿No tienes cuenta? Regístrate</div>
        </div>
        <div id="authMessage" style="margin-top: 16px; color: #d9534f; font-size: 0.8rem;"></div>
    </div>
</div>

<!-- Panel principal de la aplicación -->
<div id="appMain" class="app-main">
    <div class="map-container">
        <div id="map"></div>
    </div>
    <div class="info-panel">
        <div class="flex-row">
            <div class="user-role-badge" id="roleBadge">Cargando...</div>
            <button id="logoutMainBtn" class="logout-btn" style="width: auto;">Salir</button>
        </div>
        <div id="clientePanel">
            <!-- contenido dinámico para cliente -->
            <div class="request-form">
                <input type="text" id="destinoInput" placeholder="📍 Destino (dirección o lugar)">
                <input type="text" id="descripcionMandado" placeholder="📝 Descripción del mandado">
                <button id="solicitarMandadoBtn">📲 Solicitar Mandado</button>
            </div>
            <div class="order-status" id="orderStatusPanel">
                <strong>Estado del pedido:</strong> <span id="estadoTexto">Sin pedido activo</span>
                <div id="driverLocationInfo"></div>
            </div>
        </div>
        <div id="motomandadoPanel" style="display: none;">
            <div class="active-delivery">
                <strong>📋 Mandados disponibles cerca:</strong>
                <div id="availableOrdersList" class="delivery-list">Cargando pedidos...</div>
            </div>
            <div id="myAssignedDelivery" style="margin-top: 12px;"></div>
        </div>
    </div>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyASox7mRak5V0py29htEVWCVeipGpA0yfs",
        authDomain: "galloslivebadge.firebaseapp.com",
        databaseURL: "https://galloslivebadge-default-rtdb.firebaseio.com",
        projectId: "galloslivebadge",
        storageBucket: "galloslivebadge.firebasestorage.app",
        messagingSenderId: "979482928760",
        appId: "1:979482928760:web:3ea879dc4ee1e020df6f8d",
        measurementId: "G-8L3Z484S3D"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Variables globales
    let currentUser = null;
    let currentRole = null; // 'cliente' o 'motomandado'
    let map = null;
    let userMarker = null;       // marcador del usuario actual (cliente o moto)
    let activeOrderId = null;    // para cliente: pedido activo
    let driverMarker = null;      // marcador del repartidor (para cliente)
    let currentWatchDriver = null;
    let assignedOrderForMoto = null; // para motomandado: pedido asignado a él
    let motoWatchClientOrder = null;
    let geoWatchId = null;

    // Inicialización del mapa cuando la API esté lista
    let mapInitialized = false;
    function initMapGlobal() {
        if(mapInitialized) return;
        const mapDiv = document.getElementById('map');
        if(mapDiv) {
            map = new google.maps.Map(mapDiv, {
                center: { lat: 19.4326, lng: -99.1332 }, // Ciudad de México
                zoom: 12,
                zoomControl: true,
                mapTypeControl: false,
                fullscreenControl: true
            });
            mapInitialized = true;
        }
    }
    window.initMapGlobal = initMapGlobal;

    // Helper: obtener ubicación actual del dispositivo
    function getCurrentPosition() {
        return new Promise((resolve, reject) => {
            if(!navigator.geolocation) reject("Geolocation no soportada");
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
        });
    }

    // Actualizar ubicación en Firebase según rol
    async function updateUserLocation() {
        if(!currentUser) return;
        try {
            const position = await getCurrentPosition();
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const locationRef = db.ref(`users/${currentUser.uid}/location`);
            await locationRef.set({ lat, lng, timestamp: Date.now() });
            // mover marcador en mapa si existe
            if(map && userMarker) {
                userMarker.setPosition({ lat, lng });
                map.setCenter({ lat, lng });
            } else if(map && !userMarker) {
                userMarker = new google.maps.Marker({
                    position: { lat, lng },
                    map: map,
                    title: currentRole === 'cliente' ? 'Mi ubicación (cliente)' : 'Mi ubicación (repartidor)',
                    icon: currentRole === 'cliente' ? 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png' : 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
                });
                map.setCenter({ lat, lng });
            } else if(userMarker) userMarker.setPosition({ lat, lng });
            // Si el rol es motomandado y tiene pedido asignado, actualizar la ubicación en el pedido
            if(currentRole === 'motomandado' && assignedOrderForMoto) {
                await db.ref(`orders/${assignedOrderForMoto}/driverLocation`).set({ lat, lng, updatedAt: Date.now() });
            }
        } catch(err) { console.warn("Error ubicación:", err); }
    }

    // Iniciar seguimiento periódico
    function startLocationTracking() {
        if(geoWatchId) navigator.geolocation.clearWatch(geoWatchId);
        geoWatchId = navigator.geolocation.watchPosition(async (pos) => {
            if(!currentUser) return;
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            await db.ref(`users/${currentUser.uid}/location`).set({ lat, lng, timestamp: Date.now() });
            if(map && userMarker) userMarker.setPosition({ lat, lng });
            else if(map && !userMarker) {
                userMarker = new google.maps.Marker({ position: { lat, lng }, map: map, title: currentRole });
            }
            if(currentRole === 'motomandado' && assignedOrderForMoto) {
                await db.ref(`orders/${assignedOrderForMoto}/driverLocation`).set({ lat, lng });
            }
        }, (err) => console.warn(err), { enableHighAccuracy: true, maximumAge: 3000, timeout: 8000 });
    }

    // Cliente: escuchar cambios en su pedido activo (ubicación repartidor, estado)
    function listenToClientOrder(orderId) {
        if(currentWatchDriver) currentWatchDriver();
        const orderRef = db.ref(`orders/${orderId}`);
        const handler = orderRef.on('value', (snap) => {
            const order = snap.val();
            if(!order) return;
            document.getElementById('estadoTexto').innerText = order.status || 'pendiente';
            if(order.status === 'aceptado' && order.driverLocation) {
                const driverLoc = order.driverLocation;
                if(driverMarker) driverMarker.setMap(null);
                driverMarker = new google.maps.Marker({
                    position: { lat: driverLoc.lat, lng: driverLoc.lng },
                    map: map,
                    icon: 'http://maps.google.com/mapfiles/ms/icons/yellow-dot.png',
                    title: 'Motomandado en camino'
                });
                document.getElementById('driverLocationInfo').innerHTML = `🛵 Repartidor en movimiento (aprox)`;
                // trazar ruta opcional? se puede agregar polyline pero por simplicidad mostramos marcador
            } else if(order.status !== 'aceptado') {
                if(driverMarker) driverMarker.setMap(null);
                document.getElementById('driverLocationInfo').innerHTML = '';
            }
            if(order.status === 'entregado') {
                document.getElementById('estadoTexto').innerText = '✅ Entregado';
                if(driverMarker) driverMarker.setMap(null);
                activeOrderId = null;
            }
        });
        currentWatchDriver = () => orderRef.off('value', handler);
    }

    // Cliente: solicitar mandado
    async function solicitarMandado() {
        if(!currentUser || currentRole !== 'cliente') return;
        const destino = document.getElementById('destinoInput').value.trim();
        const descripcion = document.getElementById('descripcionMandado').value.trim();
        if(!destino) { alert("Indica destino"); return; }
        // geocodificar destino para obtener coordenadas (aproximado)
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ address: destino }, async (results, status) => {
            if(status === 'OK' && results[0]) {
                const destLat = results[0].geometry.location.lat();
                const destLng = results[0].geometry.location.lng();
                // obtener ubicación actual del cliente
                let clientLoc = { lat: 19.4326, lng: -99.1332 };
                try {
                    const pos = await getCurrentPosition();
                    clientLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                } catch(e) {}
                const newOrderRef = db.ref('orders').push();
                const orderData = {
                    clientId: currentUser.uid,
                    clientName: currentUser.email,
                    destino: destino,
                    destinoCoords: { lat: destLat, lng: destLng },
                    origenCoords: clientLoc,
                    descripcion: descripcion,
                    status: 'pendiente',
                    timestamp: Date.now(),
                    driverId: null
                };
                await newOrderRef.set(orderData);
                activeOrderId = newOrderRef.key;
                document.getElementById('estadoTexto').innerText = 'Buscando motomandado...';
                document.getElementById('destinoInput').value = '';
                document.getElementById('descripcionMandado').value = '';
                // Escuchar asignación
                const orderWatcher = db.ref(`orders/${activeOrderId}`).on('value', (snap) => {
                    const ord = snap.val();
                    if(ord && ord.driverId && ord.status === 'aceptado') {
                        // pedido aceptado, comenzar seguimiento
                        listenToClientOrder(activeOrderId);
                        orderWatcher && db.ref(`orders/${activeOrderId}`).off('value', orderWatcher);
                    }
                });
            } else {
                alert("No se pudo ubicar el destino. Intenta con una dirección más precisa.");
            }
        });
    }

    // Mostrar pedidos disponibles para motomandado
    function loadAvailableOrders() {
        if(!currentUser || currentRole !== 'motomandado') return;
        const ordersRef = db.ref('orders');
        ordersRef.off('value');
        ordersRef.on('value', (snapshot) => {
            const orders = snapshot.val();
            const container = document.getElementById('availableOrdersList');
            if(!container) return;
            if(!orders) { container.innerHTML = "No hay pedidos disponibles"; return; }
            let pendingHtml = '';
            for(let id in orders) {
                const order = orders[id];
                if(order.status === 'pendiente' && !order.driverId) {
                    pendingHtml += `
                        <div class="delivery-item">
                            <div><strong>${order.destino.substring(0,25)}</strong><br>${order.descripcion || 'Sin descripción'}</div>
                            <button class="accept-btn" data-orderid="${id}">Aceptar 🛵</button>
                        </div>
                    `;
                }
            }
            container.innerHTML = pendingHtml || "📭 No hay mandados disponibles";
            document.querySelectorAll('.accept-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const orderId = btn.getAttribute('data-orderid');
                    acceptOrder(orderId);
                });
            });
        });
    }

    // Motomandado acepta pedido
    async function acceptOrder(orderId) {
        if(!currentUser || currentRole !== 'motomandado') return;
        const orderRef = db.ref(`orders/${orderId}`);
        const snap = await orderRef.once('value');
        const order = snap.val();
        if(!order || order.status !== 'pendiente') { alert("Pedido ya no disponible"); return; }
        // Asignar a este repartidor
        await orderRef.update({ driverId: currentUser.uid, status: 'aceptado', acceptedAt: Date.now() });
        assignedOrderForMoto = orderId;
        document.getElementById('myAssignedDelivery').innerHTML = `<strong>✅ Mandado asignado:</strong> Destino: ${order.destino} <br> 🧾 ${order.descripcion || ''}`;
        // Escuchar cambios en el pedido para saber si el cliente cancela o finaliza
        const assignedRef = db.ref(`orders/${orderId}`);
        assignedRef.on('value', (snap2) => {
            const updOrder = snap2.val();
            if(updOrder && updOrder.status === 'entregado') {
                document.getElementById('myAssignedDelivery').innerHTML += `<br>🎉 Entregado - Completado`;
                assignedOrderForMoto = null;
                assignedRef.off();
            } else if(!updOrder) assignedOrderForMoto = null;
        });
        // Obtener ubicación del cliente para trazarlo en mapa
        const clientId = order.clientId;
        const clientLocRef = db.ref(`users/${clientId}/location`);
        clientLocRef.on('value', (locSnap) => {
            if(locSnap.exists() && map) {
                const loc = locSnap.val();
                if(!window.clientMarkerMoto) {
                    window.clientMarkerMoto = new google.maps.Marker({
                        position: { lat: loc.lat, lng: loc.lng },
                        map: map,
                        icon: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                        title: 'Ubicación del cliente'
                    });
                } else {
                    window.clientMarkerMoto.setPosition({ lat: loc.lat, lng: loc.lng });
                }
            }
        });
        motoWatchClientOrder = () => clientLocRef.off();
    }

    // Cerrar sesión
    async function logout() {
        if(geoWatchId) navigator.geolocation.clearWatch(geoWatchId);
        if(currentUser && currentUser.uid) {
            await db.ref(`users/${currentUser.uid}/location`).remove();
        }
        await auth.signOut();
        window.location.reload();
    }

    // UI dinámica según rol
    function applyRoleUI(role) {
        const clientePanel = document.getElementById('clientePanel');
        const motoPanel = document.getElementById('motomandadoPanel');
        if(role === 'cliente') {
            clientePanel.style.display = 'block';
            motoPanel.style.display = 'none';
            document.getElementById('roleBadge').innerText = '👤 Cliente - Solicita mandados';
            // si hay orden activa escuchar
            if(activeOrderId) listenToClientOrder(activeOrderId);
        } else {
            clientePanel.style.display = 'none';
            motoPanel.style.display = 'block';
            document.getElementById('roleBadge').innerText = '🛵 Motomandado - Repartidor';
            loadAvailableOrders();
        }
    }

    // Inicializar después del login
    async function onAuthStateChanged(user) {
        if(user) {
            currentUser = user;
            const roleSnapshot = await db.ref(`users/${user.uid}/role`).once('value');
            currentRole = roleSnapshot.val() || (document.getElementById('roleSelect').value);
            if(!roleSnapshot.exists()) await db.ref(`users/${user.uid}/role`).set(currentRole);
            // guardar datos en firebase
            await db.ref(`users/${user.uid}`).update({ email: user.email, role: currentRole });
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appMain').style.display = 'flex';
            // iniciar mapa si no está listo
            if(!mapInitialized && window.google && google.maps) initMapGlobal();
            else if(!mapInitialized) setTimeout(() => initMapGlobal(), 500);
            startLocationTracking();
            applyRoleUI(currentRole);
            // Si es cliente, buscar si tiene pedidos activos previos (status pendiente o aceptado)
            const ordersRef = db.ref('orders');
            const snapshotOrders = await ordersRef.orderByChild('clientId').equalTo(user.uid).once('value');
            let activeFound = false;
            snapshotOrders.forEach((childSnap) => {
                const ord = childSnap.val();
                if(ord.status === 'pendiente' || ord.status === 'aceptado') {
                    activeOrderId = childSnap.key;
                    activeFound = true;
                    listenToClientOrder(activeOrderId);
                    document.getElementById('estadoTexto').innerText = ord.status === 'pendiente' ? 'Pedido pendiente...' : 'En camino';
                }
            });
            if(!activeFound) activeOrderId = null;
            // Para motomandado: revisar si ya tiene un pedido asignado
            if(currentRole === 'motomandado') {
                const assignedQuery = await ordersRef.orderByChild('driverId').equalTo(user.uid).once('value');
                assignedQuery.forEach((snap) => {
                    const ord = snap.val();
                    if(ord.status === 'aceptado') {
                        assignedOrderForMoto = snap.key;
                        document.getElementById('myAssignedDelivery').innerHTML = `<strong>📦 Mandado activo:</strong> ${ord.destino}`;
                        // escuchar cliente ubicación
                        const clientId = ord.clientId;
                        const locRef = db.ref(`users/${clientId}/location`);
                        locRef.on('value', (locSnap) => {
                            if(locSnap.exists() && map) {
                                if(!window.clientMarkerMoto) window.clientMarkerMoto = new google.maps.Marker({ map, position: { lat: locSnap.val().lat, lng: locSnap.val().lng }, icon: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png' });
                                else window.clientMarkerMoto.setPosition({ lat: locSnap.val().lat, lng: locSnap.val().lng });
                            }
                        });
                    }
                });
            }
        } else {
            // pantalla login
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appMain').style.display = 'none';
        }
    }

    // Registro / Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('emailInput').value;
        const pwd = document.getElementById('passwordInput').value;
        const role = document.getElementById('roleSelect').value;
        const msgDiv = document.getElementById('authMessage');
        if(!email || !pwd) { msgDiv.innerText = "Completa correo y contraseña"; return; }
        try {
            await auth.signInWithEmailAndPassword(email, pwd);
            // después login se actualizará rol en db
            const user = auth.currentUser;
            await db.ref(`users/${user.uid}/role`).set(role);
        } catch(err) {
            if(err.code === 'auth/user-not-found') {
                try {
                    await auth.createUserWithEmailAndPassword(email, pwd);
                    const user = auth.currentUser;
                    await db.ref(`users/${user.uid}/role`).set(role);
                } catch(regErr) { msgDiv.innerText = regErr.message; }
            } else { msgDiv.innerText = err.message; }
        }
    });
    document.getElementById('toggleRegisterBtn').addEventListener('click', () => {
        document.getElementById('loginBtn').innerText = 'Registrarse / Iniciar sesión';
    });
    document.getElementById('logoutMainBtn').addEventListener('click', logout);
    document.getElementById('solicitarMandadoBtn')?.addEventListener('click', solicitarMandado);
    auth.onAuthStateChanged(onAuthStateChanged);
    // Inicializar si el mapa está cargado antes
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => { if(window.google) initMapGlobal(); });
    else { if(window.google) initMapGlobal(); }
</script>
</body>
</html>
